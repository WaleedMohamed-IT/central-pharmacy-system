<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Pharmacy System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0b1f3a, #0d2a4f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #1c3b63;
            border: none;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .login-card h3 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .form-control {
            background: #0d2a4f;
            border: 1px solid #2a5298;
            color: white;
            border-radius: 8px;
            padding: 12px;
        }

        .form-control:focus {
            background: #0d2a4f;
            border-color: #00b4d8;
            color: white;
            box-shadow: 0 0 0 3px rgba(0,180,216,0.2);
        }

        .form-control::placeholder {
            color: #8899aa;
        }

        .btn-login {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #0a58ca, #084298);
            transform: translateY(-1px);
        }

        .logo {
            text-align: center;
            font-size: 60px;
            margin-bottom: 10px;
        }

        .system-name {
            color: #00b4d8;
            text-align: center;
            font-size: 13px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="login-card">

        <div class="logo">💊</div>
        <div class="system-name">HOSPITAL PHARMACY SYSTEM</div>
        <h3>🔐 Login</h3>

        {% if error %}
        <div class="alert alert-danger text-center py-2">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <input name="username"
                       class="form-control"
                       placeholder="👤 Username"
                       required>
            </div>

            <div class="mb-3">
                <input name="password"
                       type="password"
                       class="form-control"
                       placeholder="🔑 Password"
                       required>
            </div>

            <button type="submit" class="btn-login">
                Login →
            </button>
        </form>

    </div>
</body>
</html>
