{% extends "base.html" %}

{% block title %}إضافة موردة - نظام الصيدلية{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-lg">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-plus"></i> إضافة موردة جديدة</h5>
                </div>
                <div class="card-body p-4">
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form method="POST">
                        <!-- اسم الشركة -->
                        <div class="mb-3">
                            <label class="form-label"><strong>اسم الشركة *</strong></label>
                            <input type="text" name="company_name" class="form-control" placeholder="مثال: شركة الجودة للأدوية" required>
                        </div>

                        <!-- اسم الدواء -->
                        <div class="mb-3">
                            <label class="form-label"><strong>اسم الدواء *</strong></label>
                            <input type="text" name="drug_name" class="form-control" placeholder="مثال: أسبرين 500mg" required>
                        </div>

                        <!-- رقم التشغيلة -->
                        <div class="mb-3">
                            <label class="form-label"><strong>رقم التشغيلة (Batch Number) *</strong></label>
                            <input type="text" name="batch_number" class="form-control" placeholder="مثال: BATCH20260101" required>
                        </div>

                        <!-- تاريخ التوريد -->
                        <div class="mb-3">
                            <label class="form-label"><strong>تاريخ التوريد *</strong></label>
                            <input type="date" name="supply_date" class="form-control" required>
                        </div>

                        <!-- تاريخ انتهاء الصلاحية -->
                        <div class="mb-3">
                            <label class="form-label"><strong>تاريخ انتهاء الصلاحية *</strong></label>
                            <input type="date" name="expiry_date" class="form-control" required>
                        </div>

                        <!-- السعر -->
                        <div class="mb-3">
                            <label class="form-label"><strong>السعر (جنيه مصري) *</strong></label>
                            <input type="number" name="price" class="form-control" placeholder="مثال: 50.50" step="0.01" required>
                        </div>

                        <!-- الكمية -->
                        <div class="mb-3">
                            <label class="form-label"><strong>الكمية *</strong></label>
                            <input type="number" name="quantity" class="form-control" placeholder="مثال: 100" required>
                        </div>

                        <!-- الأزرار -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success btn-lg flex-grow-1">
                                <i class="fas fa-save"></i> حفظ الموردة
                            </button>
                            <a href="{{ url_for('suppliers') }}" class="btn btn-secondary btn-lg flex-grow-1">
                                <i class="fas fa-times"></i> إلغاء
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
